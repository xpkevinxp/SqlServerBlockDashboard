services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
