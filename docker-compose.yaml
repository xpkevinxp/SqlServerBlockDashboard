services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.dashboard-https.rule=Host(`healthy.mikipu.com`)
      - traefik.http.routers.dashboard-https.entrypoints=https
      - traefik.http.routers.dashboard-https.tls=true
      - traefik.http.routers.dashboard-https.tls.certresolver=letsencrypt
      - traefik.http.routers.dashboard-https.service=dashboard
      - traefik.http.routers.dashboard-http.rule=Host(`healthy.mikipu.com`)
      - traefik.http.routers.dashboard-http.entrypoints=http
      - traefik.http.routers.dashboard-http.middlewares=redirect-to-https
      - traefik.http.services.dashboard.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
